<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase Imports for Cloud Syncing -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuration provided by environment
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'freelance-tracker-v1';

        window.trackerApp = {
            db,
            auth,
            appId,
            user: null
        };

        // Initialize Authentication (Rule 3)
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth failed:", error);
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            window.trackerApp.user = user;
            if (user) {
                document.getElementById('user-id-display').innerText = `Syncing as: ${user.uid}`;
                setupDataListener(user.uid);
            }
        });

        // Listen for cloud data changes
        function setupDataListener(uid) {
            const dataDoc = doc(db, 'artifacts', appId, 'users', uid, 'settings', 'mainData');
            onSnapshot(dataDoc, (snapshot) => {
                if (snapshot.exists()) {
                    window.syncCloudData(snapshot.data().tasks);
                }
            }, (error) => {
                console.error("Firestore sync error:", error);
            });
        }

        // Global save function
        window.saveToCloud = async (tasks) => {
            if (!window.trackerApp.user) return;
            const uid = window.trackerApp.user.uid;
            const dataDoc = doc(db, 'artifacts', appId, 'users', uid, 'settings', 'mainData');
            try {
                await setDoc(dataDoc, { tasks: tasks, lastUpdated: Date.now() });
            } catch (e) {
                console.error("Failed to save to cloud:", e);
            }
        };
    </script>
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: #161b22;
            border: 1px solid #30363d;
        }

        input, textarea, select {
            background-color: #0d1117 !important;
            border: 1px solid #30363d !important;
            color: white !important;
            border-radius: 6px !important;
            outline: none;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #58a6ff !important;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            display: inline-block;
            user-select: none;
        }

        .status-paid { background: #238636; color: white; }
        .status-pending { background: #9e6a03; color: white; }
        .status-notdone { background: #484f58; color: white; }

        .amount-entry-zone {
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: background 0.2s;
            display: inline-block;
            min-width: 80px;
            text-align: right;
        }
        
        .amount-entry-zone:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        .inline-edit-input {
            width: 70px;
            text-align: right;
            padding: 2px 4px !important;
            font-family: monospace;
            font-weight: bold;
            font-size: 14px;
        }

        .client-eyebrow {
            color: #58a6ff;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 2px;
        }

        .table-container { overflow-x: auto; }
        
        @media (max-width: 640px) {
            th, td { padding: 0.75rem 0.5rem !important; }
        }

        .sync-status {
            font-size: 10px;
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dot { height: 6px; width: 6px; border-radius: 50%; background: #238636; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold">Earnings Tracker</h1>
                <div class="sync-status">
                    <div class="dot"></div>
                    <span id="user-id-display">Connecting to cloud...</span>
                </div>
                <p id="current-rate" class="text-xs text-gray-400 mt-1">Loading COP rate...</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="glass-card p-5 rounded-lg text-center">
                <p class="text-gray-400 text-xs font-bold uppercase">Paid</p>
                <h2 id="summary-paid" class="text-2xl font-bold mt-1 text-green-500">$0.00</h2>
            </div>
            <div class="glass-card p-5 rounded-lg text-center">
                <p class="text-gray-400 text-xs font-bold uppercase">Pending</p>
                <h2 id="summary-pending" class="text-2xl font-bold mt-1 text-orange-500">$0.00</h2>
            </div>
            <div class="glass-card p-5 rounded-lg text-center">
                <p class="text-gray-400 text-xs font-bold uppercase">Total Projected</p>
                <h2 id="summary-total" class="text-2xl font-bold mt-1 text-blue-400">$0.00</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="glass-card p-6 rounded-lg sticky top-8">
                    <h3 class="text-sm font-bold mb-4 uppercase text-gray-400 tracking-widest">Add New Task</h3>
                    <form id="task-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">DATE</label>
                            <input type="date" id="date" required class="w-full p-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">WORKING FOR</label>
                            <select id="client" required class="w-full p-2 text-sm">
                                <option value="" disabled selected>Select Source...</option>
                                <option value="Dad">Dad</option>
                                <option value="MyStrengthBook">MyStrengthBook</option>
                                <option value="3rd Party">3rd Party</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">WORK DESCRIPTION</label>
                            <textarea id="description" rows="3" placeholder="Describe the task..." required class="w-full p-2 text-sm"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded text-sm transition uppercase">
                            Add to Table
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass-card rounded-lg overflow-hidden">
                    <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/20">
                        <span class="text-sm font-bold uppercase">Activity Log</span>
                        <select id="month-filter" class="text-xs p-1">
                            <option value="all">All Time</option>
                        </select>
                    </div>

                    <div class="table-container">
                        <table class="w-full text-left">
                            <thead class="bg-gray-800/50 text-[10px] text-gray-400 uppercase font-bold">
                                <tr>
                                    <th class="p-4">Info</th>
                                    <th class="p-4 text-right">USD Amount</th>
                                    <th class="p-4 text-center">Status</th>
                                    <th class="p-4"></th>
                                </tr>
                            </thead>
                            <tbody id="task-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let copRate = 3900;
        let activeEditId = null;

        window.onload = () => {
            fetchRate();
            // Try local first while cloud loads
            const local = localStorage.getItem('budgetTasks');
            if(local) {
                tasks = JSON.parse(local);
                updateAll();
            }
            document.getElementById('date').valueAsDate = new Date();
        };

        // This is called automatically when the cloud data changes
        window.syncCloudData = (cloudTasks) => {
            tasks = cloudTasks || [];
            updateAll(false); // Don't re-save back to cloud in a loop
        };

        async function fetchRate() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                if(data?.rates?.COP) {
                    copRate = data.rates.COP;
                    document.getElementById('current-rate').innerText = `Current Rate: 1 USD = ${Math.round(copRate).toLocaleString()} COP`;
                    updateAll(false);
                }
            } catch (e) {
                console.error("Rate fetch failed");
            }
        }

        document.getElementById('task-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const newTask = {
                id: Date.now(),
                date: document.getElementById('date').value,
                client: document.getElementById('client').value,
                description: document.getElementById('description').value,
                amount: 0, 
                status: 'notdone'
            };
            tasks.unshift(newTask);
            save();
            e.target.reset();
            document.getElementById('date').valueAsDate = new Date();
        });

        function setEditMode(id) {
            activeEditId = id;
            updateAll(false);
            setTimeout(() => {
                const input = document.getElementById(`input-${id}`);
                if(input) {
                    input.focus();
                    input.select();
                }
            }, 10);
        }

        function handleAmountBlur(id, value) {
            const parsed = parseFloat(value);
            if (!isNaN(parsed)) {
                const task = tasks.find(t => t.id === id);
                if(task) task.amount = parsed;
            }
            activeEditId = null;
            save();
        }

        function handleAmountKey(e, id) {
            if(e.key === 'Enter') e.target.blur();
            if(e.key === 'Escape') {
                activeEditId = null;
                updateAll(false);
            }
        }

        function toggleStatus(id) {
            const states = ['notdone', 'pending', 'paid'];
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = states[(states.indexOf(task.status) + 1) % 3];
                save();
            }
        }

        function deleteTask(id) {
            if(confirm("Delete this?")) {
                tasks = tasks.filter(t => t.id !== id);
                save();
            }
        }

        function save() {
            // Save to local for speed
            localStorage.setItem('budgetTasks', JSON.stringify(tasks));
            // Save to cloud for syncing between devices
            if (window.saveToCloud) {
                window.saveToCloud(tasks);
            }
            updateAll(false);
        }

        function updateAll(shouldSave = true) {
            const filter = document.getElementById('month-filter').value;
            const filtered = filter === 'all' ? tasks : tasks.filter(t => t.date.startsWith(filter));

            const paid = filtered.filter(t => t.status === 'paid').reduce((s, t) => s + t.amount, 0);
            const pending = filtered.filter(t => t.status === 'pending').reduce((s, t) => s + t.amount, 0);
            const total = filtered.reduce((s, t) => s + t.amount, 0);

            document.getElementById('summary-paid').innerText = `$${paid.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('summary-pending').innerText = `$${pending.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('summary-total').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            const list = document.getElementById('task-list');
            list.innerHTML = '';
            
            filtered.forEach(t => {
                const isEditing = activeEditId === t.id;
                const row = document.createElement('tr');
                row.className = "border-b border-gray-800 text-sm hover:bg-gray-800/10 transition-colors";
                
                const amountDisplay = isEditing 
                    ? `<input type="number" step="0.01" id="input-${t.id}" class="inline-edit-input" value="${t.amount}" onblur="handleAmountBlur(${t.id}, this.value)" onkeydown="handleAmountKey(event, ${t.id})">`
                    : `<div class="amount-entry-zone font-bold text-white" onclick="setEditMode(${t.id})">$${t.amount.toFixed(2)}</div>`;

                row.innerHTML = `
                    <td class="p-4">
                        <div class="client-eyebrow uppercase">${t.client}</div>
                        <div class="text-[10px] text-gray-500 mb-1">${t.date}</div>
                        <div class="text-gray-300 text-xs italic line-clamp-2">${t.description}</div>
                    </td>
                    <td class="p-4 text-right font-mono">
                        ${amountDisplay}
                        <div class="text-[10px] text-gray-500 mt-1">~ ${Math.round(t.amount * copRate).toLocaleString()} COP</div>
                    </td>
                    <td class="p-4 text-center">
                        <span onclick="toggleStatus(${t.id})" class="status-badge status-${t.status}">
                            ${t.status === 'notdone' ? 'Not Done' : t.status}
                        </span>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="deleteTask(${t.id})" class="text-gray-600 hover:text-red-400 p-2"><i class="fas fa-times"></i></button>
                    </td>
                `;
                list.appendChild(row);
            });

            const filterEl = document.getElementById('month-filter');
            const savedVal = filterEl.value;
            const months = [...new Set(tasks.map(t => t.date.substring(0, 7)))].sort().reverse();
            filterEl.innerHTML = '<option value="all">All Time</option>';
            months.forEach(m => {
                filterEl.innerHTML += `<option value="${m}">${m}</option>`;
            });
            filterEl.value = savedVal;
        }
    </script>
</body>
</html>
