<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'personal-budget-v1';

        let cloudUnsubscribe = null;
        let currentUser = null;

        // Rule 3: Auth Before Queries
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const savedPin = localStorage.getItem('sync_pin');
            if (savedPin && user) {
                document.getElementById('pin-input').value = savedPin;
                setupSync(savedPin);
            } else {
                document.getElementById('sync-status-text').innerText = "Not Synced";
                document.getElementById('sync-dot').style.background = "#8b949e";
            }
        });

        window.trackerApp = {
            savePin: (pin) => {
                if (!pin || pin.length < 4) return alert("Please enter at least 4 characters.");
                localStorage.setItem('sync_pin', pin);
                if (currentUser) setupSync(pin);
            }
        };

        function setupSync(pin) {
            if (cloudUnsubscribe) cloudUnsubscribe();
            
            document.getElementById('sync-status-text').innerText = "Syncing: " + pin;
            document.getElementById('sync-dot').style.background = "#238636";

            // Rule 1: Use specific allowed path
            const dataDoc = doc(db, 'artifacts', appId, 'public', 'data', 'sync_' + pin);
            
            cloudUnsubscribe = onSnapshot(dataDoc, (snapshot) => {
                if (snapshot.exists()) {
                    const cloudData = snapshot.data().tasks;
                    window.syncFromCloud(cloudData);
                }
            }, (err) => {
                console.error("Firestore error:", err);
                document.getElementById('sync-status-text').innerText = "Access Error";
                document.getElementById('sync-dot').style.background = "#f85149";
            });

            window.pushToCloud = async (tasks) => {
                if (!currentUser) return;
                try {
                    await setDoc(dataDoc, { 
                        tasks: tasks, 
                        lastUpdated: Date.now(),
                        updatedBy: currentUser.uid
                    });
                } catch (e) {
                    console.error("Save failed:", e);
                }
            };
        }
    </script>
    <style>
        body { background-color: #0b0e14; color: #ffffff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: #161b22; border: 1px solid #30363d; }
        input, textarea, select { background-color: #0d1117 !important; border: 1px solid #30363d !important; color: white !important; border-radius: 6px !important; outline: none; }
        input:focus { border-color: #58a6ff !important; }
        .status-badge { padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; cursor: pointer; display: inline-block; }
        .status-paid { background: #238636; }
        .status-pending { background: #9e6a03; }
        .status-notdone { background: #484f58; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; }
        .amount-row:hover { background: rgba(88, 166, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Earnings Tracker</h1>
                <p id="current-rate" class="text-sm text-blue-400 mt-1 font-mono">Fetching COP rate...</p>
            </div>
            
            <div class="glass-card p-3 rounded-xl flex flex-wrap items-center gap-4">
                <div class="flex items-center gap-2">
                    <div id="sync-dot" class="dot bg-gray-500"></div>
                    <span id="sync-status-text" class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Connecting...</span>
                </div>
                <div class="flex gap-2 border-l border-gray-700 pl-4">
                    <input type="password" id="pin-input" placeholder="Enter PIN" class="text-xs p-2 w-28" autocomplete="off">
                    <button onclick="window.trackerApp.savePin(document.getElementById('pin-input').value)" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-xs font-bold transition-all">Sync Device</button>
                </div>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="glass-card p-6 rounded-2xl border-b-4 border-b-green-500">
                <p class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Paid</p>
                <h2 id="summary-paid" class="text-3xl font-bold mt-1 text-green-400">$0.00</h2>
            </div>
            <div class="glass-card p-6 rounded-2xl border-b-4 border-b-orange-500">
                <p class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Pending</p>
                <h2 id="summary-pending" class="text-3xl font-bold mt-1 text-orange-400">$0.00</h2>
            </div>
            <div class="glass-card p-6 rounded-2xl border-b-4 border-b-blue-500">
                <p class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Projected Total</p>
                <h2 id="summary-total" class="text-3xl font-bold mt-1 text-blue-400">$0.00</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="glass-card p-6 rounded-2xl sticky top-8">
                    <h3 class="text-xs font-black mb-6 text-gray-400 uppercase tracking-widest">New Entry</h3>
                    <form id="task-form" class="space-y-5">
                        <div>
                            <label class="block text-[10px] font-black text-gray-500 mb-1 uppercase">Date</label>
                            <input type="date" id="date" required class="w-full p-3 text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-500 mb-1 uppercase">Client</label>
                            <select id="client" required class="w-full p-3 text-sm">
                                <option value="Dad">Dad</option>
                                <option value="MyStrengthBook">MyStrengthBook</option>
                                <option value="3rd Party">3rd Party</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-500 mb-1 uppercase">Task Description</label>
                            <textarea id="description" rows="3" placeholder="What did you do?" required class="w-full p-3 text-sm"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black text-xs transition-all uppercase tracking-widest">
                            Add to Log
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass-card rounded-2xl overflow-hidden">
                    <div class="p-5 border-b border-gray-800 flex justify-between items-center bg-white/5">
                        <span class="text-xs font-black text-gray-400 uppercase tracking-widest">Recent Activity</span>
                        <select id="month-filter" class="text-xs bg-transparent border-none p-1 font-bold text-blue-400 cursor-pointer"></select>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="text-[10px] text-gray-500 uppercase font-black border-b border-gray-800">
                                <tr>
                                    <th class="p-5">Job Details</th>
                                    <th class="p-5 text-right">Amount (USD)</th>
                                    <th class="p-5 text-center">Status</th>
                                    <th class="p-5"></th>
                                </tr>
                            </thead>
                            <tbody id="task-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let copRate = 3900;
        let activeEditId = null;

        window.onload = () => {
            fetchRate();
            const local = localStorage.getItem('budgetTasks');
            if(local) {
                tasks = JSON.parse(local);
                render();
            }
            document.getElementById('date').valueAsDate = new Date();
        };

        window.syncFromCloud = (cloudTasks) => {
            if (cloudTasks) {
                tasks = cloudTasks;
                localStorage.setItem('budgetTasks', JSON.stringify(tasks));
                render();
            }
        };

        async function fetchRate() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                if(data?.rates?.COP) {
                    copRate = data.rates.COP;
                    document.getElementById('current-rate').innerText = `Live: 1 USD = ${Math.round(copRate).toLocaleString()} COP`;
                    render();
                }
            } catch (e) {
                document.getElementById('current-rate').innerText = "Rate unavailable";
            }
        }

        document.getElementById('task-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const newTask = {
                id: Date.now(),
                date: document.getElementById('date').value,
                client: document.getElementById('client').value,
                description: document.getElementById('description').value,
                amount: 0, 
                status: 'notdone'
            };
            tasks.unshift(newTask);
            save();
            e.target.reset();
            document.getElementById('date').valueAsDate = new Date();
        });

        function handleAmountBlur(id, val) {
            const num = parseFloat(val);
            const task = tasks.find(t => t.id === id);
            if(task && !isNaN(num)) task.amount = num;
            activeEditId = null;
            save();
        }

        function toggleStatus(id) {
            const states = ['notdone', 'pending', 'paid'];
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = states[(states.indexOf(task.status) + 1) % 3];
                save();
            }
        }

        function save() {
            localStorage.setItem('budgetTasks', JSON.stringify(tasks));
            if (window.pushToCloud) window.pushToCloud(tasks);
            render();
        }

        function render() {
            const filter = document.getElementById('month-filter').value || 'all';
            const filtered = filter === 'all' ? tasks : tasks.filter(t => t.date.startsWith(filter));

            const paid = filtered.filter(t => t.status === 'paid').reduce((s, t) => s + t.amount, 0);
            const pending = filtered.filter(t => t.status === 'pending').reduce((s, t) => s + t.amount, 0);
            const total = filtered.reduce((s, t) => s + t.amount, 0);

            document.getElementById('summary-paid').innerText = `$${paid.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('summary-pending').innerText = `$${pending.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('summary-total').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            const list = document.getElementById('task-list');
            list.innerHTML = '';
            
            filtered.forEach(t => {
                const isEditing = activeEditId === t.id;
                const row = document.createElement('tr');
                row.className = "amount-row border-b border-gray-800/50 transition-colors";
                
                const amountInput = isEditing 
                    ? `<input type="number" step="0.01" class="w-24 text-right p-1 text-white bg-blue-900 border-blue-500 border rounded" value="${t.amount}" onblur="handleAmountBlur(${t.id}, this.value)" onkeydown="if(event.key==='Enter')this.blur()" autofocus>`
                    : `<div class="cursor-pointer font-mono font-bold text-xl text-white" onclick="activeEditId=${t.id};render()">$${t.amount.toFixed(2)}</div>`;

                row.innerHTML = `
                    <td class="p-5">
                        <div class="text-[10px] font-black text-blue-400 uppercase mb-1">${t.client}</div>
                        <div class="text-sm font-medium text-gray-200 mb-1">${t.description}</div>
                        <div class="text-[10px] text-gray-500 font-mono">${t.date}</div>
                    </td>
                    <td class="p-5 text-right">
                        ${amountInput}
                        <div class="text-[10px] text-gray-500 mt-1">≈ ${(t.amount * copRate).toLocaleString(undefined, {maximumFractionDigits:0})} COP</div>
                    </td>
                    <td class="p-5 text-center">
                        <span onclick="toggleStatus(${t.id})" class="status-badge status-${t.status}">
                            ${t.status === 'notdone' ? 'To Do' : t.status}
                        </span>
                    </td>
                    <td class="p-5 text-right">
                        <button onclick="if(confirm('Delete?')){tasks=tasks.filter(x=>x.id!==${t.id});save()}" class="text-gray-700 hover:text-red-500 p-2"><i class="fas fa-trash-alt"></i></button>
                    </td>
                `;
                list.appendChild(row);
            });

            const filterEl = document.getElementById('month-filter');
            const currentVal = filterEl.value;
            const months = [...new Set(tasks.map(t => t.date.substring(0, 7)))].sort().reverse();
            filterEl.innerHTML = '<option value="all">ALL TIME</option>';
            months.forEach(m => filterEl.innerHTML += `<option value="${m}">${m.toUpperCase()}</option>`);
            filterEl.value = currentVal || 'all';
        }
    </script>
</body>
</html>
