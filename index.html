<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --neon-gold: #ffcc00;
            --bg-dark: #05070a;
            --card-bg: #0f1218;
        }

        body { 
            background-color: var(--bg-dark); 
            color: #e2e8f0; 
            font-family: 'Inter', -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            line-height: 1.5;
        }

        .glass { 
            background: var(--card-bg); 
            border: 1px solid #1e293b; 
            border-radius: 20px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        input, select, textarea { 
            background: #07090d !important; 
            border: 1px solid #1e293b !important; 
            color: white !important; 
            border-radius: 12px !important; 
            outline: none !important;
            transition: all 0.2s ease;
        }

        input:focus { border-color: var(--neon-blue) !important; box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }

        /* Neon Glow Status Buttons */
        .status-btn { 
            padding: 8px 14px; 
            border-radius: 10px; 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: all 0.3s ease;
            border: 1px solid transparent;
            letter-spacing: 0.05em;
        }

        .status-paid { 
            background: rgba(57, 255, 20, 0.1); 
            color: var(--neon-green);
            border-color: rgba(57, 255, 20, 0.3);
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.5);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.1);
        }
        .status-paid:hover { background: rgba(57, 255, 20, 0.2); box-shadow: 0 0 20px rgba(57, 255, 20, 0.3); }

        .status-pending { 
            background: rgba(255, 204, 0, 0.1); 
            color: var(--neon-gold);
            border-color: rgba(255, 204, 0, 0.3);
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.5);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.1);
        }
        .status-pending:hover { background: rgba(255, 204, 0, 0.2); box-shadow: 0 0 20px rgba(255, 204, 0, 0.3); }

        .status-notdone { 
            background: rgba(148, 163, 184, 0.1); 
            color: #94a3b8;
            border-color: rgba(148, 163, 184, 0.2);
        }

        /* Neon Glow Primary Button */
        .btn-primary {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            transform: translateY(-1px);
        }

        .money { font-family: 'JetBrains Mono', monospace; font-weight: 800; letter-spacing: -0.05em; }
        
        .transfer-btn { 
            font-size: 10px; 
            font-weight: 700; 
            text-transform: uppercase; 
            padding: 8px 12px; 
            border-radius: 10px; 
            border: 1px solid #1e293b;
            color: #94a3b8;
            transition: all 0.2s;
        }
        .transfer-btn:hover { border-color: var(--neon-blue); color: var(--neon-blue); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12">
            <div>
                <h1 class="text-5xl font-black tracking-tight mb-2 italic">DASH<span class="text-blue-500">BOARD</span></h1>
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2 px-3 py-1 bg-blue-500/10 rounded-full border border-blue-500/20">
                        <div class="w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse"></div>
                        <span class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Local Node Active</span>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-3 w-full md:w-auto">
                <button onclick="exportData()" class="transfer-btn flex-1 md:flex-none flex items-center justify-center gap-2">
                    <i class="fas fa-file-export"></i> Export
                </button>
                <label class="transfer-btn flex-1 md:flex-none flex items-center justify-center gap-2 cursor-pointer">
                    <i class="fas fa-file-import"></i> Import
                    <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
                </label>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass p-8 relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <i class="fas fa-check-circle text-4xl text-green-400"></i>
                </div>
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em]">Received</span>
                <div id="val-paid" class="text-4xl font-black text-green-400 money mt-3 tracking-tighter">$0.00</div>
            </div>
            <div class="glass p-8 relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <i class="fas fa-clock text-4xl text-orange-400"></i>
                </div>
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em]">In Transit</span>
                <div id="val-pending" class="text-4xl font-black text-orange-400 money mt-3 tracking-tighter">$0.00</div>
            </div>
            <div class="glass p-8 border-t-2 border-blue-500 shadow-[0_0_30px_rgba(59,130,246,0.1)]">
                <span class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em]">Total Lifetime</span>
                <div id="val-total" class="text-4xl font-black text-white money mt-3 tracking-tighter">$0.00</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- Sidebar: Add Form -->
            <div class="lg:col-span-4">
                <div class="glass p-8 sticky top-8">
                    <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-8 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-blue-500"></i> Create Entry
                    </h2>
                    <form id="entry-form" class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-[9px] font-bold text-gray-500 uppercase ml-1">Timeline</label>
                            <input type="date" id="f-date" required class="w-full p-4 font-bold text-sm">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-bold text-gray-500 uppercase ml-1">Entity</label>
                            <select id="f-client" required class="w-full p-4 font-bold text-sm appearance-none">
                                <option value="Dad">Dad</option>
                                <option value="MyStrengthBook">MyStrengthBook</option>
                                <option value="3rd Party">3rd Party</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-bold text-gray-500 uppercase ml-1">Brief</label>
                            <textarea id="f-desc" placeholder="Describe the task..." required class="w-full p-4 text-sm font-medium h-28 resize-none"></textarea>
                        </div>
                        <button type="submit" class="w-full btn-primary py-4 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] active:scale-95">Add to Ledger</button>
                    </form>
                </div>
            </div>

            <!-- Main Content: History -->
            <div class="lg:col-span-8">
                <div class="glass overflow-hidden min-h-[500px]">
                    <div class="p-6 border-b border-white/5 bg-white/[0.02] flex justify-between items-center">
                        <span class="text-xs font-black text-gray-400 uppercase tracking-widest flex items-center gap-2">
                            <i class="fas fa-list-ul text-blue-500"></i> Records
                        </span>
                        <select id="f-month" onchange="renderApp()" class="bg-transparent! border-none! text-xs font-black text-blue-400 cursor-pointer focus:ring-0"></select>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <tbody id="list"></tbody>
                        </table>
                    </div>
                    <div id="empty" class="p-32 text-center hidden">
                        <i class="fas fa-folder-open text-gray-800 text-5xl mb-4"></i>
                        <p class="text-gray-600 font-bold uppercase text-[10px] tracking-[0.4em]">Vault Empty</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];

        window.onload = () => {
            const saved = localStorage.getItem('my_budget_data');
            if (saved) tasks = JSON.parse(saved);
            document.getElementById('f-date').valueAsDate = new Date();
            renderApp();
        };

        function saveData() {
            localStorage.setItem('my_budget_data', JSON.stringify(tasks));
            renderApp();
        }

        window.exportData = () => {
            const dataStr = JSON.stringify(tasks, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `budget_ledger_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
        };

        window.importData = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        tasks = imported;
                        saveData();
                    }
                } catch (err) { alert('Invalid file format.'); }
            };
            reader.readAsText(file);
        };

        document.getElementById('entry-form').onsubmit = (e) => {
            e.preventDefault();
            tasks.unshift({
                id: Date.now(),
                date: document.getElementById('f-date').value,
                client: document.getElementById('f-client').value,
                desc: document.getElementById('f-desc').value,
                amount: 0,
                status: 'notdone'
            });
            saveData();
            e.target.reset();
            document.getElementById('f-date').valueAsDate = new Date();
        };

        window.updateAmount = (id, val) => {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.amount = parseFloat(val) || 0;
                saveData();
            }
        };

        window.toggleStatus = (id) => {
            const task = tasks.find(t => t.id === id);
            if (task) {
                const states = ['notdone', 'pending', 'paid'];
                task.status = states[(states.indexOf(task.status) + 1) % 3];
                saveData();
            }
        };

        window.deleteTask = (id) => {
            tasks = tasks.filter(t => t.id !== id);
            saveData();
        };

        function renderApp() {
            const filter = document.getElementById('f-month').value || 'all';
            const filtered = filter === 'all' ? tasks : tasks.filter(t => t.date.startsWith(filter));

            const paid = filtered.filter(t => t.status === 'paid').reduce((a, b) => a + b.amount, 0);
            const pending = filtered.filter(t => t.status === 'pending').reduce((a, b) => a + b.amount, 0);
            const total = filtered.reduce((a, b) => a + b.amount, 0);

            document.getElementById('val-paid').innerText = `$${paid.toLocaleString(undefined, {minimumFractionDigits:2})}`;
            document.getElementById('val-pending').innerText = `$${pending.toLocaleString(undefined, {minimumFractionDigits:2})}`;
            document.getElementById('val-total').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits:2})}`;

            const list = document.getElementById('list');
            const empty = document.getElementById('empty');
            list.innerHTML = '';
            
            if (filtered.length === 0) empty.classList.remove('hidden');
            else empty.classList.add('hidden');

            filtered.forEach(t => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-white/[0.03] hover:bg-white/[0.02] transition-colors group";
                tr.innerHTML = `
                    <td class="p-6 align-top">
                        <div class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-1 opacity-80">${t.client}</div>
                        <div class="text-[13px] font-bold text-gray-100 mb-1">${t.desc}</div>
                        <div class="text-[9px] text-gray-600 font-mono font-bold">${t.date}</div>
                    </td>
                    <td class="p-6 text-right align-top">
                        <div class="flex flex-col items-end gap-2">
                            <div class="relative group/input">
                                <span class="absolute left-[-15px] top-[4px] text-xs font-black text-gray-700">$</span>
                                <input type="number" step="0.01" 
                                    class="w-28 bg-transparent! border-none! text-right font-black money text-2xl text-white focus:text-blue-400" 
                                    value="${t.amount}" 
                                    onblur="updateAmount(${t.id}, this.value)">
                            </div>
                            <span onclick="toggleStatus(${t.id})" class="status-btn status-${t.status}">
                                ${t.status === 'notdone' ? 'Pending Action' : t.status}
                            </span>
                        </div>
                    </td>
                    <td class="p-6 text-right align-top">
                        <button onclick="deleteTask(${t.id})" class="text-gray-800 hover:text-red-500/80 transition-colors pt-1">
                            <i class="fas fa-trash-alt text-sm"></i>
                        </button>
                    </td>
                `;
                list.appendChild(tr);
            });

            const filterSelect = document.getElementById('f-month');
            const savedVal = filterSelect.value;
            const months = [...new Set(tasks.map(t => t.date.substring(0, 7)))].sort().reverse();
            filterSelect.innerHTML = '<option value="all">FULL RECAP</option>';
            months.forEach(m => {
                const [y, mon] = m.split('-');
                const label = new Date(y, mon-1).toLocaleString('default', { month: 'short', year: 'numeric' }).toUpperCase();
                filterSelect.innerHTML += `<option value="${m}">${label}</option>`;
            });
            filterSelect.value = savedVal || 'all';
        }
    </script>
</body>
</html>
